<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b27"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a56a0"/>
      <stop offset="100%" stop-color="#c98df2"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a56a0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a56a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b6fd0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7b6fd0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c98df2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c98df2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="900" height="320" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="899" height="319" rx="20" fill="none" stroke="#2a3142" stroke-width="1"/>

  <!-- title -->
  <text x="40" y="52" fill="#ffffff" font-size="24" font-weight="700">The Climb</text>
  <text x="40" y="76" fill="#8b95a7" font-size="14" font-weight="400">Four roles, two years, one pattern: ship the thing in front of me, then reach for the next harder problem.</text>

  <!-- timeline base line -->
  <line x1="150" y1="170" x2="750" y2="170" stroke="#2a3142" stroke-width="6" stroke-linecap="round"/>
  <line x1="150" y1="170" x2="750" y2="170" stroke="url(#line)" stroke-width="6" stroke-linecap="round"/>

  <!-- ===== NODE 1 ===== -->
  <circle cx="150" cy="170" r="34" fill="url(#glow1)"/>
  <circle cx="150" cy="170" r="11" fill="#0d1117" stroke="#1a56a0" stroke-width="4"/>
  <text x="150" y="128" fill="#1a56a0" font-size="13" font-weight="700" text-anchor="middle">Jan 2024</text>
  <text x="150" y="210" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Data Analyst</text>
  <text x="150" y="230" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Intern</text>
  <text x="150" y="252" fill="#8b95a7" font-size="12" text-anchor="middle">UBS</text>

  <!-- ===== NODE 2 ===== -->
  <circle cx="450" cy="170" r="34" fill="url(#glow2)"/>
  <circle cx="450" cy="170" r="11" fill="#0d1117" stroke="#7b6fd0" stroke-width="4"/>
  <text x="450" y="128" fill="#9d8fe0" font-size="13" font-weight="700" text-anchor="middle">Aug 2024</text>
  <text x="450" y="210" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Data Analyst</text>
  <text x="450" y="230" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">&amp; ML Engineer</text>
  <text x="450" y="252" fill="#8b95a7" font-size="12" text-anchor="middle">UBS</text>

  <!-- ===== NODE 3 ===== -->
  <circle cx="750" cy="170" r="40" fill="url(#glow3)"/>
  <circle cx="750" cy="170" r="13" fill="#0d1117" stroke="#c98df2" stroke-width="4"/>
  <text x="750" y="124" fill="#c98df2" font-size="13" font-weight="700" text-anchor="middle">Nov 2025</text>
  <text x="750" y="210" fill="#ffffff" font-size="16" font-weight="800" text-anchor="middle">AI Engineer</text>
  <text x="750" y="232" fill="#c98df2" font-size="12" font-weight="600" text-anchor="middle">Current</text>
  <text x="750" y="252" fill="#8b95a7" font-size="12" text-anchor="middle">UBS Investment Banking</text>

  <!-- footer tag -->
  <text x="40" y="298" fill="#5a6478" font-size="12">Compliance &amp; Operational Risk Control  ·  Pune, India</text>
</svg>
